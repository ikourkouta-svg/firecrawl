name: Sync Upstream Firecrawl

on:
  schedule:
    # Check for updates every Monday at 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/mendableai/firecrawl.git || true
          git fetch upstream main --tags

      - name: Check for new releases
        id: check
        run: |
          LATEST_TAG=$(git tag --sort=-creatordate | head -1)
          CURRENT=$(git log --oneline -1 --format='%H' HEAD)
          UPSTREAM=$(git log --oneline -1 --format='%H' upstream/main)

          if [ "$CURRENT" = "$UPSTREAM" ]; then
            echo "already_current=true" >> $GITHUB_OUTPUT
            echo "Already up to date with upstream"
          else
            BEHIND=$(git rev-list --count HEAD..upstream/main)
            echo "already_current=false" >> $GITHUB_OUTPUT
            echo "behind_by=$BEHIND" >> $GITHUB_OUTPUT
            echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
            echo "Behind upstream by $BEHIND commits (latest tag: $LATEST_TAG)"
          fi

      - name: Create update branch and PR
        if: steps.check.outputs.already_current == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/sync-upstream-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git merge upstream/main --no-edit || {
            echo "CONFLICTS=true" >> $GITHUB_ENV
            git merge --abort
            echo "Merge has conflicts — manual resolution needed"
          }

          if [ "$CONFLICTS" != "true" ]; then
            git push origin "$BRANCH"
            gh pr create \
              --title "Sync upstream Firecrawl (${{ steps.check.outputs.latest_tag }})" \
              --body "$(cat <<'EOF'
          ## Upstream Sync

          - **Behind by**: ${{ steps.check.outputs.behind_by }} commits
          - **Latest tag**: ${{ steps.check.outputs.latest_tag }}
          - **Source**: [mendableai/firecrawl](https://github.com/mendableai/firecrawl)

          Auto-generated by sync-upstream workflow. Review the changes, then merge to trigger Railway redeploy.

          > If Railway build fails after merge, check `apps/api/Dockerfile.railway` for path changes.
          EOF
          )" \
              --base main \
              --head "$BRANCH"
          else
            # Create issue instead if there are conflicts
            gh issue create \
              --title "Firecrawl upstream update available (conflicts)" \
              --body "$(cat <<'EOF'
          Upstream Firecrawl has updates (${{ steps.check.outputs.behind_by }} commits behind, latest: ${{ steps.check.outputs.latest_tag }}) but merge has conflicts.

          Manual sync needed:
          ```bash
          cd ~/Projects/General/firecrawl
          git fetch upstream main
          git merge upstream/main
          # resolve conflicts
          git push origin main
          ```
          EOF
          )"
          fi
