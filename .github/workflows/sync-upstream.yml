name: Sync Upstream Firecrawl

on:
  schedule:
    # Check for updates every Monday at 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/mendableai/firecrawl.git || true
          git fetch upstream main --tags

      - name: Check for new releases
        id: check
        run: |
          LATEST_TAG=$(git tag --sort=-creatordate | head -1)
          CURRENT=$(git log --oneline -1 --format='%H' HEAD)
          UPSTREAM=$(git log --oneline -1 --format='%H' upstream/main)

          if [ "$CURRENT" = "$UPSTREAM" ]; then
            echo "already_current=true" >> $GITHUB_OUTPUT
            echo "Already up to date with upstream"
          else
            BEHIND=$(git rev-list --count HEAD..upstream/main)
            echo "already_current=false" >> $GITHUB_OUTPUT
            echo "behind_by=$BEHIND" >> $GITHUB_OUTPUT
            echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
            echo "Behind upstream by $BEHIND commits (latest tag: $LATEST_TAG)"
          fi

      - name: Merge upstream and create PR
        if: steps.check.outputs.already_current == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git merge upstream/main --no-edit || {
            echo "CONFLICTS=true" >> $GITHUB_ENV
            git merge --abort
            echo "Merge has conflicts — manual resolution needed"
          }

      - name: Revert upstream workflow changes
        if: steps.check.outputs.already_current == 'false' && env.CONFLICTS != 'true'
        run: |
          # GITHUB_TOKEN can't push .github/workflows/ changes — restore fork's versions
          git checkout origin/main -- .github/workflows/
          git diff --staged --quiet .github/workflows/ || {
            git commit -m "chore: keep fork workflow files (strip upstream CI changes)"
          }

      - name: Create PR via REST API
        if: steps.check.outputs.already_current == 'false' && env.CONFLICTS != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/sync-upstream-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

          # Use REST API instead of GraphQL (works in forked repos)
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d "$(jq -n \
              --arg title "Sync upstream Firecrawl (${{ steps.check.outputs.latest_tag }})" \
              --arg head "$BRANCH" \
              --arg base "main" \
              --arg body "## Upstream Sync\n\n- **Behind by**: ${{ steps.check.outputs.behind_by }} commits\n- **Latest tag**: ${{ steps.check.outputs.latest_tag }}\n- **Source**: [mendableai/firecrawl](https://github.com/mendableai/firecrawl)\n\nAuto-generated by sync-upstream workflow. Review the changes, then merge to trigger Railway redeploy.\n\n> If Railway build fails after merge, check \`apps/api/Dockerfile.railway\` for path changes." \
              '{title: $title, head: $head, base: $base, body: $body}'
            )"

      - name: Create issue for conflicts
        if: steps.check.outputs.already_current == 'false' && env.CONFLICTS == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues \
            -d "$(jq -n \
              --arg title "Firecrawl upstream update available (conflicts)" \
              --arg body "Upstream Firecrawl has updates (${{ steps.check.outputs.behind_by }} commits behind, latest: ${{ steps.check.outputs.latest_tag }}) but merge has conflicts.\n\nManual sync needed:\n\`\`\`bash\ncd ~/Projects/General/firecrawl\ngit fetch upstream main\ngit merge upstream/main\n# resolve conflicts\ngit push origin main\n\`\`\`" \
              '{title: $title, body: $body}'
            )"
